name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-json:
    name: Validate JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          echo "Validating marketplace.json..."
          python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))"

          echo "Validating plugin.json..."
          python3 -c "import json; json.load(open('plugins/multi-agent-orchestrator/.claude-plugin/plugin.json'))"

          echo "Validating task-graph template..."
          python3 -c "import json; json.load(open('plugins/multi-agent-orchestrator/skills/multi-agent-orchestrator/templates/task-graph-template.json'))"

          echo "All JSON files valid."

  validate-structure:
    name: Validate Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files exist
        run: |
          required=(
            "plugins/multi-agent-orchestrator/agents/mao-architect.md"
            "plugins/multi-agent-orchestrator/agents/mao-orchestrator.md"
            "plugins/multi-agent-orchestrator/agents/mao-implementer.md"
            "plugins/multi-agent-orchestrator/agents/mao-worker.md"
            "plugins/multi-agent-orchestrator/agents/mao-verifier.md"
            "plugins/multi-agent-orchestrator/agents/mao-reviewer.md"
            "plugins/multi-agent-orchestrator/agents/mao-reflector.md"
            "plugins/multi-agent-orchestrator/agents/mao-explorer.md"
            "plugins/multi-agent-orchestrator/commands/mao.md"
            "plugins/multi-agent-orchestrator/commands/mao-plan.md"
            "plugins/multi-agent-orchestrator/commands/mao-status.md"
            "plugins/multi-agent-orchestrator/skills/multi-agent-orchestrator/SKILL.md"
          )
          missing=0
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Some required files are missing!"
            exit 1
          fi
          echo "All required files present."

  lint-shell:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: |
          find . -name "*.sh" -not -path "./.git/*" | while read -r f; do
            echo "Checking $f..."
            shellcheck "$f" || true
          done
