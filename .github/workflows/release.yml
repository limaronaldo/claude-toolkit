name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
            artifact: claude-primer-linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            artifact: claude-primer-linux-arm64
          - os: macos-14
            platform: macos
            arch: arm64
            artifact: claude-primer-macos-arm64
          # macos-13 (Intel) runners deprecated — arm64 binary works via Rosetta 2
          # Uncomment when GitHub provides a replacement Intel macOS runner
          # - os: macos-13
          #   platform: macos
          #   arch: x86_64
          #   artifact: claude-primer-macos-x86_64
          - os: windows-latest
            platform: windows
            arch: x86_64
            artifact: claude-primer-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        shell: bash
        run: pyinstaller build/pyinstaller.spec --distpath build/dist --workpath build/work

      - name: Rename artifact
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            mv build/dist/claude-primer.exe build/dist/${{ matrix.artifact }}
          else
            mv build/dist/claude-primer build/dist/${{ matrix.artifact }}
            chmod +x build/dist/${{ matrix.artifact }}
          fi

      - name: Smoke test
        shell: bash
        run: |
          SMOKE_DIR="${RUNNER_TEMP}/smoke-test"
          mkdir -p "$SMOKE_DIR"
          if [ "${{ matrix.platform }}" = "windows" ]; then
            build/dist/${{ matrix.artifact }} --help
            build/dist/${{ matrix.artifact }} "$SMOKE_DIR" --yes --no-git-check
          else
            ./build/dist/${{ matrix.artifact }} --help
            ./build/dist/${{ matrix.artifact }} "$SMOKE_DIR" --yes --no-git-check
          fi
          test -f "$SMOKE_DIR/CLAUDE.md"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/dist/${{ matrix.artifact }}
          retention-days: 1

  publish-github:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -name "claude-primer-*" -exec cp {} release/ \;
          ls -lh release/

      - name: Generate checksums
        working-directory: release
        run: |
          sha256sum claude-primer-* > checksums-sha256.txt
          echo "=== Checksums ==="
          cat checksums-sha256.txt

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*

  publish-pypi:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build and publish
        working-directory: python
        run: |
          pip install build twine
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  publish-npm:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish to npm
        working-directory: npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    needs: publish-github
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/limaronaldo/claude-primer:latest
            ghcr.io/limaronaldo/claude-primer:${{ github.event.release.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
