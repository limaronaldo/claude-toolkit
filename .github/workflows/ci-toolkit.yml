name: CI — Claude Toolkit

on:
  push:
    branches: [main]
    paths: ['packages/claude-toolkit/**']
  pull_request:
    paths: ['packages/claude-toolkit/**']

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: cd packages/claude-toolkit/npm && node --test tests/claude_toolkit.test.mjs
